<!DOCTYPE html>
<html>
<head>
  <title>Mapa com Rota</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 400px; }
  </style>
</head>
<body>

<h3>Simulador</h3>

<input id="inputApelido" placeholder="Seu nome"><br><br>
<input id="inputOrigem" placeholder="Origem"><br><br>
<input id="inputDestino" placeholder="Destino"><br><br>

<button onclick="definirRota()">Buscar Motorista</button>

<p>Valor: R$ <span id="valor">0.00</span></p>

<div id="map"></div>

<script>
let map = L.map('map').setView([-5.4323, -44.6697], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: 'Mapa'
}).addTo(map);

let origem = null;
let destino = null;
let marcadorOrigem = null;
let marcadorDestino = null;
let rota = null;

// Converter endereço em coordenadas
async function enderecoParaCoords(endereco) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`;
    const response = await fetch(url);
    const data = await response.json();

    if (data.length > 0) {
      return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    } else {
      return null;
    }
  } catch (e) {
    return null;
  }
}

// Calcular valor simples
function calcularCobranca(origem, destino) {
  const dx = origem[0] - destino[0];
  const dy = origem[1] - destino[1];
  const distancia = Math.sqrt(dx * dx + dy * dy);

  const valor = (distancia * 100).toFixed(2);
  document.getElementById("valor").textContent = valor;
}

// Simular salvar usuário
function salvarUsuario(nome, lat, lng) {
  console.log("Salvo:", nome, lat, lng);
}

// Função principal
async function definirRota() {
  const apelido = document.getElementById("inputApelido").value || 'Anon';
  const origemInput = document.getElementById("inputOrigem").value;
  const destinoInput = document.getElementById("inputDestino").value;

  if (!origemInput || !destinoInput) {
    alert("⚠️ Digite origem e destino!");
    return;
  }

  document.getElementById("valor").textContent = "Calculando...";

  origem = await enderecoParaCoords(origemInput) || origem;
  destino = await enderecoParaCoords(destinoInput);

  if (!destino) {
    alert("Destino não encontrado!");
    return;
  }

  if (marcadorOrigem) map.removeLayer(marcadorOrigem);
  if (marcadorDestino) map.removeLayer(marcadorDestino);

  marcadorOrigem = L.marker(origem).addTo(map).bindPopup("Origem").openPopup();
  marcadorDestino = L.marker(destino).addTo(map).bindPopup("Destino").openPopup();

  const url = `https://routing.openstreetmap.de/routed-car/route/v1/driving/${origem[1]},${origem[0]};${destino[1]},${destino[0]}?overview=full&geometries=geojson`;

  try {
    const rotaResponse = await fetch(url);
    const rotaData = await rotaResponse.json();

    if (!rotaData.routes || rotaData.routes.length === 0) {
      alert("Erro ao calcular rota!");
      document.getElementById("valor").textContent = "0.00";
      return;
    }

    const coords = rotaData.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

    if (rota) map.removeLayer(rota);
    rota = L.polyline(coords, { color: 'blue' }).addTo(map);
    map.fitBounds(rota.getBounds());

    calcularCobranca(origem, destino);

    salvarUsuario(apelido, origem[0], origem[1]);

    alert(`Motorista encontrado!\nOrigem: ${origem}\nDestino: ${destino}\nValor: R$ ${document.getElementById("valor").textContent}`);

  } catch (e) {
    alert("Erro na API de rota!");
    document.getElementById("valor").textContent = "0.00";
  }
}

// Clique no mapa
map.on('click', function(e) {
  if (!origem) {
    origem = [e.latlng.lat, e.latlng.lng];
    document.getElementById("inputOrigem").value = `${origem[0]}, ${origem[1]}`;

    if (marcadorOrigem) map.removeLayer(marcadorOrigem);
    marcadorOrigem = L.marker(origem).addTo(map).bindPopup("Origem").openPopup();

  } else {
    destino = [e.latlng.lat, e.latlng.lng];
    document.getElementById("inputDestino").value = `${destino[0]}, ${destino[1]}`;

    if (marcadorDestino) map.removeLayer(marcadorDestino);
    marcadorDestino = L.marker(destino).addTo(map).bindPopup("Destino").openPopup();

    definirRota();
  }
});
</script>

</body>
</html>
