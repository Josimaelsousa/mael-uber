<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mael Uber - Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body, html { margin: 0; padding: 0; height: 100%; width: 100%; display: flex; flex-direction: column; font-family: 'Segoe UI', Arial, sans-serif; background: #121212; }
    header { background: #000; color: #fff; text-align: center; padding: 15px; font-size: 22px; font-weight: bold; letter-spacing: 1px; border-bottom: 2px solid #1e88e5; }
    #map { flex: 1; width: 100%; }
    footer { text-align: center; padding: 15px; background: #1c1c1c; border-top: 1px solid #333; }
    button { background: #1e88e5; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
    button:hover { background: #1565c0; transform: translateY(-2px); }
    button:disabled { background: #555; cursor: not-allowed; }
    #cobranca { margin-top: 12px; text-align: center; }
    #valorTotal { background-color: #1e88e5; color: white; padding: 12px 20px; border-radius: 50px; font-weight: bold; display: inline-block; box-shadow: 0 4px 15px rgba(30,136,229,0.4); }
    #enderecos { background: #1c1c1c; color: white; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    #enderecos table { margin: auto; width: 100%; max-width: 400px; }
    #enderecos input { padding: 10px; width: 100%; border: 1px solid #444; border-radius: 5px; background: #2c2c2c; color: white; margin-bottom: 5px; outline: none; }
    #sugestoesDestino { position: absolute; background: #fff; border: 1px solid #ccc; width: 100%; max-height: 200px; overflow-y: auto; z-index: 1000; color: #333; border-radius: 0 0 5px 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    #sugestoesDestino div { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; }
    #sugestoesDestino div:hover { background: #f0f7ff; }
    #procurandoMotorista { display: none; margin-top: 15px; font-size: 16px; color: #aaa; font-style: italic; }
  </style>
</head>
<body>
  <header>Mael Uber</header>

  <div id="enderecos">
    <table>
      <tr>
        <td><input type="text" id="inputApelido" placeholder="Seu Nome"></td>
      </tr>
      <tr>
        <td><input type="text" id="inputOrigem" placeholder="Local de partida"></td>
      </tr>
      <tr>
        <td style="position: relative;">
          <input type="text" id="inputDestino" placeholder="Para onde vamos?" oninput="buscarSugestoes()">
          <div id="sugestoesDestino"></div>
        </td>
      </tr>
    </table>
    <div style="text-align: center; margin-top: 10px;">
        <button id="btnTracar" onclick="definirRota()">Traçar Rota</button>
    </div>
  </div>

  <div id="map"></div>

  <footer>
    <button onclick="iniciarCorrida()">Confirmar Viagem</button>
    <div id="cobranca">
      <div id="valorTotal">R$ <span id="valor">0.00</span></div>
      <div id="procurandoMotorista">Conectando aos motoristas próximos...</div>
    </div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBAp1CRfM_nn5GAn1gzhutrtgED7RQc4RY",
      authDomain: "mael-uber.firebaseapp.com",
      databaseURL: "https://mael-uber-default-rtdb.firebaseio.com",
      projectId: "mael-uber",
      storageBucket: "mael-uber.appspot.com",
      messagingSenderId: "939220832919",
      appId: "1:939220832919:web:c9bfb4ca302f1aeefb4fd2"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    window.salvarUsuario = function(apelido, lat, lng) {
      const usuariosRef = ref(database, 'usuarios');
      push(usuariosRef, { apelido, latitude: lat, longitude: lng });
    };

    const marcadoresUsuarios = {};
    onValue(ref(database, 'usuarios'), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;
      Object.keys(data).forEach(key => {
        const user = data[key];
        if (marcadoresUsuarios[key]) {
          marcadoresUsuarios[key].setLatLng([user.latitude, user.longitude]);
        } else {
          marcadoresUsuarios[key] = L.marker([user.latitude, user.longitude]).addTo(map).bindPopup(user.apelido);
        }
      });
    });
  </script>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: false }).setView([-23.5505, -46.6333], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    let origem, destino, rota, marcadorOrigem, marcadorDestino;

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(pos => {
        origem = [pos.coords.latitude, pos.coords.longitude];
        document.getElementById("inputOrigem").value = "Minha Localização";
        marcadorOrigem = L.marker(origem).addTo(map).bindPopup("Você").openPopup();
        map.setView(origem, 15);
      });
    }

    async function enderecoParaCoords(endereco) {
      if (endereco === "Minha Localização") return origem;
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}&limit=1`);
        const data = await res.json();
        return data.length > 0 ? [parseFloat(data[0].lat), parseFloat(data[0].lon)] : null;
      } catch (e) { return null; }
    }

    async function definirRota() {
      const btn = document.getElementById("btnTracar");
      const destinoInput = document.getElementById("inputDestino").value;
      if (!destinoInput) return alert("Para onde você quer ir?");

      btn.disabled = true;
      btn.innerText = "Calculando...";

      destino = await enderecoParaCoords(destinoInput);
      if (!destino) {
        alert("Não encontramos esse endereço.");
        btn.disabled = false;
        btn.innerText = "Traçar Rota";
        return;
      }

      if (marcadorDestino) map.removeLayer(marcadorDestino);
      marcadorDestino = L.marker(destino).addTo(map).bindPopup("Destino");

      try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${origem[1]},${origem[0]};${destino[1]},${destino[0]}?overview=full&geometries=geojson`);
        const data = await res.json();
        const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);

        if (rota) map.removeLayer(rota);
        rota = L.polyline(coords, { color: '#1e88e5', weight: 6, opacity: 0.8 }).addTo(map);
        map.fitBounds(rota.getBounds(), { padding: [50, 50] });

        const distKm = data.routes[0].distance / 1000;
        document.getElementById("valor").textContent = (distKm * 2.8).toFixed(2);
      } catch (e) {
        alert("Erro ao calcular rota. Tente novamente.");
      }

      btn.disabled = false;
      btn.innerText = "Traçar Rota";
    }

    let timeoutBusca;
    function buscarSugestoes() {
      clearTimeout(timeoutBusca);
      const query = document.getElementById("inputDestino").value;
      if (query.length < 4) return;

      timeoutBusca = setTimeout(async () => {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=4`);
        const data = await res.json();
        const div = document.getElementById("sugestoesDestino");
        div.innerHTML = "";
        data.forEach(item => {
          const s = document.createElement("div");
          s.innerText = item.display_name;
          s.onclick = () => {
            document.getElementById("inputDestino").value = item.display_name;
            div.innerHTML = "";
            definirRota();
          };
          div.appendChild(s);
        });
      }, 500);
    }

    function iniciarCorrida() {
      if (!rota) return alert("Trace a rota primeiro!");
      document.getElementById("procurandoMotorista").style.display = "block";
      setTimeout(() => {
        document.getElementById("procurandoMotorista").style.display = "none";
        alert("Motorista a caminho!");
      }, 2500);
    }
  </script>
</body>
</html>
